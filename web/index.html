<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>News Alarm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--card:#161b22;--border:#30363d;
  --text:#e6edf3;--dim:#8b949e;--green:#3fb950;
  --red:#f85149;--yellow:#d29922;--cyan:#58a6ff;
  --magenta:#bc8cff;--urgentbg:#6e1010;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);overflow-x:hidden}

/* Welcome overlay (Chrome autoplay policy) */
#welcome{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .3s}
#welcome.hidden{opacity:0;pointer-events:none}
#welcome h1{font-size:2rem;margin-bottom:1rem;color:var(--cyan)}
#welcome p{color:var(--dim);margin-bottom:2rem;text-align:center;max-width:24rem;line-height:1.5}
#welcome button{font-size:1.3rem;padding:1rem 3rem;border:none;border-radius:12px;
  background:var(--cyan);color:var(--bg);cursor:pointer;font-weight:700;
  transition:transform .1s}
#welcome button:active{transform:scale(0.95)}

/* Connection status bar */
#conn-bar{position:fixed;top:0;left:0;right:0;z-index:100;padding:6px 12px;
  font-size:.8rem;font-weight:600;text-align:center;transition:all .3s}
#conn-bar.ok{background:transparent;color:transparent;height:0;padding:0;overflow:hidden}
#conn-bar.warn{background:#6e4400;color:#ffc}
#conn-bar.err{background:var(--urgentbg);color:#fcc}
#conn-bar.restarted{background:#1a3a5c;color:#8cf}

/* Main layout */
#app{padding:12px;padding-top:8px;max-width:700px;margin:0 auto;min-height:100vh}

/* Side-by-side layout for wide landscape screens (TV, desktop monitor).
   Left column: threat panel + channels table (fixed-width).
   Right column: news feed (fills remaining space, scrollable). */
@media (min-width: 900px) and (min-aspect-ratio: 6/5) {
  #app{max-width:none;padding:12px 24px}
  #columns{display:flex;align-items:flex-start}
  #col-left{width:370px;min-width:370px;position:sticky;top:12px}
  #col-right{flex:1;min-width:0;margin-left:24px}
  #news-section{margin-top:0}
}

/* Timer */
#timer-row{display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:12px;font-size:.85rem;color:var(--dim)}
#timer-val{font-variant-numeric:tabular-nums;font-weight:600}

/* Threat panel */
#threat-panel{border-radius:12px;padding:16px;margin-bottom:16px}
#threat-panel.clear{background:var(--card);border:1px solid var(--border)}
#threat-panel.warn{background:#2a1e00;border:2px solid var(--yellow)}
#threat-panel.alert{background:var(--urgentbg);border:2px solid var(--red);
  animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,81,73,0.4)}50%{box-shadow:0 0 20px 4px rgba(248,81,73,0.3)}}
#threat-header{font-size:1.3rem;font-weight:700;margin-bottom:12px;text-align:center}
.bool-row{display:grid;grid-template-columns:3.2rem 1fr;gap:8px;align-items:start;
  padding:6px 0;font-size:.9rem;min-height:2.8rem}
.bool-badge{text-align:center;padding:3px 8px;border-radius:6px;font-weight:700;
  font-size:.8rem;line-height:1.4;align-self:center}
.bool-badge.yes{background:var(--red);color:#fff}
.bool-badge.yes-warn{background:var(--yellow);color:#000}
.bool-badge.no{background:#1a2a1a;color:var(--green);opacity:.5}
.bool-info{display:flex;flex-direction:column;gap:2px;justify-content:center}
.bool-label{line-height:1.3}
.bool-label.active{color:var(--red);font-weight:600}
.bool-label.active-warn{color:var(--yellow);font-weight:600}
.bool-label.inactive{color:var(--dim)}
.bool-reason{font-size:.8rem;font-weight:600;color:var(--yellow);line-height:1.3;
  min-height:1.1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bool-group-header{display:flex;justify-content:space-between;align-items:center;
  font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--magenta);padding:8px 0 2px;margin-top:4px;border-top:1px solid var(--border)}
.bool-group-header:first-child{margin-top:0;border-top:none;padding-top:0}
.group-mute-btn{padding:2px 7px;border-radius:5px;font-size:.6rem;text-transform:uppercase;
  cursor:pointer;background:none;font-weight:700;letter-spacing:.04em;
  display:inline-flex;align-items:center;gap:4px;line-height:1;transition:opacity .2s}
.group-mute-btn.tick-btn{border:1.5px solid var(--yellow);color:var(--yellow)}
.group-mute-btn.alarm-btn{border:1.5px solid var(--magenta);color:var(--magenta)}
.group-mute-btn.muted{opacity:.4}

/* News cards */
#news-section{margin-top:16px}
#news-header{font-size:1rem;font-weight:600;color:var(--cyan);margin-bottom:10px}
.news-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;margin-bottom:10px}
.news-card .tag{display:inline-block;padding:2px 8px;border-radius:5px;
  font-size:.7rem;font-weight:700;text-transform:uppercase;margin-right:6px}
.tag.critical{background:var(--magenta);color:#fff}
.tag.high{background:var(--yellow);color:#000}
.tag.medium{background:var(--cyan);color:#000}
.tag.low{background:var(--border);color:var(--dim)}
.news-card .headline{font-weight:600;font-size:.95rem;margin-top:4px}
.news-card .channel{font-size:.75rem;color:var(--dim);margin-top:2px}
.news-card .summary{font-size:.85rem;color:var(--text);margin-top:6px;line-height:1.4}

.empty-msg{color:var(--dim);text-align:center;padding:2rem 0;font-size:.9rem}

/* Validation error bar */
#validation-bar{position:fixed;bottom:0;left:0;right:0;z-index:101;padding:8px 12px;
  font-size:.75rem;font-weight:600;text-align:center;background:#5c2d00;color:#ffd;
  max-height:30vh;overflow-y:auto;display:none;border-top:2px solid #f90}
#validation-bar.visible{display:block}

/* Channels table */
#channels-section{margin-top:24px;border-left:3px solid transparent;padding-left:8px;transition:border-color .5s,opacity .5s}
#channels-section.stale-warn{border-left-color:var(--yellow);opacity:.8}
#channels-section.stale-danger{border-left-color:var(--red);opacity:.6}
#channels-header{font-size:1rem;font-weight:600;color:var(--magenta);margin-bottom:10px}
.ch-table{width:100%;border-collapse:collapse;font-size:.85rem}
.ch-table th{text-align:left;color:var(--dim);font-weight:600;font-size:.75rem;
  text-transform:uppercase;letter-spacing:.04em;padding:6px 10px;
  border-bottom:1px solid var(--border)}
.ch-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.ch-table tr:last-child td{border-bottom:none}
.ch-name{color:var(--text);font-weight:500}
.ch-count{color:var(--cyan);font-variant-numeric:tabular-nums;text-align:right}
.ch-time{color:var(--dim);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}

/* Debug toasts — numbered, with clear oldest/newest indicators */
#toast-container{position:fixed;bottom:8px;right:8px;z-index:9998;
  max-width:min(420px,90vw);display:flex;flex-direction:column-reverse;
  gap:6px;pointer-events:none;max-height:80vh;overflow-y:auto}
.toast{padding:8px 10px;border-radius:8px;font-size:.75rem;line-height:1.4;
  font-family:monospace;word-break:break-word;pointer-events:auto;
  opacity:0;transform:translateY(10px);animation:toastin .2s forwards;
  max-height:10rem;overflow-y:auto;border-left:4px solid #555;position:relative}
.toast.log{background:#0d1a2a;color:#8cf;border-left-color:#2a6aaa}
.toast.warn{background:#2a1e00;color:#ffc;border-left-color:#aa8800}
.toast.error{background:#2a0808;color:#fcc;border-left-color:#cc3333}
/* Newest toast: bright glow + thicker border */
.toast.newest{border-left-width:6px}
.toast.newest.log{box-shadow:0 0 12px rgba(88,166,255,0.25);border-left-color:#58a6ff}
.toast.newest.warn{box-shadow:0 0 12px rgba(210,153,34,0.25);border-left-color:#d29922}
.toast.newest.error{box-shadow:0 0 12px rgba(248,81,73,0.25);border-left-color:#f85149}
/* Oldest toast: dimmed */
.toast.oldest{opacity:.6}
.toast-seq{display:inline-block;min-width:2.5em;font-weight:900;margin-right:4px;
  color:#fff;opacity:.5;font-size:.7rem}
.toast-badge{display:inline-block;font-weight:800;font-size:.6rem;text-transform:uppercase;
  letter-spacing:.04em;padding:1px 5px;border-radius:3px;margin-right:6px;vertical-align:middle}
.toast-badge.b-log{background:#1a3a5a;color:#58a6ff}
.toast-badge.b-warn{background:#4a3500;color:#ffc}
.toast-badge.b-err{background:#4a0f0f;color:#f85149}
.toast-tag{display:inline-block;font-weight:800;font-size:.55rem;text-transform:uppercase;
  letter-spacing:.05em;padding:1px 4px;border-radius:3px;margin-left:6px;vertical-align:middle}
.toast-tag.t-newest{background:#0f4a2a;color:#3fb950}
.toast-tag.t-oldest{background:#3a1a00;color:#d29922}
.toast .toast-countdown{float:right;margin-left:8px;opacity:.5;font-size:.65rem;font-weight:600}
.toast.fadeout{animation:toastout .3s forwards}
@keyframes toastin{to{opacity:.92;transform:translateY(0)}}
@keyframes toastout{to{opacity:0;transform:translateY(10px)}}

/* Loading skeleton */
#loading{text-align:center;padding:3rem 0;color:var(--dim)}
#loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Welcome overlay for Chrome autoplay unlock -->
<div id="welcome">
  <h1>News Alarm</h1>
  <p>This dashboard monitors Telegram news channels for threat alerts. Tap below to enable sound alerts.</p>
  <button onclick="unlock()">Enable Alerts &amp; Enter</button>
  <label id="tick-toggle" style="margin-top:2.2rem;display:flex;align-items:center;gap:.75rem;
    cursor:pointer;user-select:none;-webkit-user-select:none;padding:.6rem 1.4rem;
    border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--border);
    transition:background .2s" onclick="toggleTick()">
    <span id="tick-check" style="display:inline-flex;align-items:center;justify-content:center;
      width:26px;height:26px;border-radius:7px;border:2px solid var(--yellow);
      background:var(--yellow);transition:all .2s;flex-shrink:0">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="transition:opacity .15s">
        <path d="M3.5 8.5L6.5 11.5L12.5 4.5" stroke="#000" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <span style="font-size:.95rem;color:var(--text);font-weight:500;line-height:1.3">
      Enable tick sounds<br>
      <span style="font-size:.78rem;color:var(--dim);font-weight:400">Minor threats &mdash; soft click every second</span>
    </span>
  </label>
  <div style="margin-top:1.4rem;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <button id="btn-test-alarm" onclick="testSound('alarm')" style="font-size:.9rem;padding:.5rem 1.2rem;border:3px solid transparent;border-radius:8px;
      background:var(--red);color:#fff;cursor:pointer;font-weight:600;transition:all .15s">Test Alarm</button>
    <button id="btn-test-tick" onclick="testSound('tick')" style="font-size:.9rem;padding:.5rem 1.2rem;border:3px solid transparent;border-radius:8px;
      background:var(--yellow);color:#000;cursor:pointer;font-weight:600;transition:all .15s">Test Tick</button>
  </div>
</div>

<!-- Debug toasts (console messages shown on-screen for devices without dev tools) -->
<div id="toast-container"></div>

<!-- Connection status -->
<div id="conn-bar" class="ok">Connected</div>
<!-- Validation error display -->
<div id="validation-bar"></div>

<div id="app">
  <div id="timer-row">
    <span id="timer-val">Displayed data &mdash;</span>
    <span style="margin-left:16px">Generating:</span>
    <span id="gen-val">&mdash;</span>
  </div>

  <div id="columns">
    <div id="col-left">
      <div id="threat-panel" class="clear">
        <div id="threat-header"></div>
        <div id="threat-bools"></div>
      </div>

      <div id="channels-section">
        <div id="channels-header">Monitored Channels</div>
        <div id="channels-body"></div>
      </div>
    </div>

    <div id="col-right">
      <div id="news-section">
        <div id="news-header">News Updates</div>
        <div id="news-list">
          <div id="loading"><div class="spinner"></div><p style="margin-top:12px">Waiting for first update&hellip;</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";

// ================================================================
//  POLYFILLS
// ================================================================

// String.prototype.padStart (ES2017) — needed for old smart TV browsers.
if(!String.prototype.padStart){
  String.prototype.padStart = function(len, fill){
    var s = String(this); fill = fill || ' ';
    while(s.length < len) s = fill + s;
    return s;
  };
}

// Array.prototype.some — should exist everywhere, but belt-and-suspenders.
if(!Array.prototype.some){
  Array.prototype.some = function(fn){
    for(var i = 0; i < this.length; i++){
      if(fn(this[i], i, this)) return true;
    }
    return false;
  };
}

// ================================================================
//  DEBUG TOASTS
//
//  Intercepts console.log/warn/error to show messages on-screen.
//  Each toast is sequentially numbered (#1, #2, ...) so order is
//  unambiguous. The NEWEST toast gets a bright glow + "NEWEST" tag.
//  The OLDEST visible toast gets an "OLDEST" tag + dimmed opacity.
//  Toasts auto-dismiss after 30s with a visible countdown.
//  Hovering any toast pauses ALL countdowns.
// ================================================================

var TOASTS_ENABLED = false; // set to true to show debug toasts on-screen
var _toastContainer = document.getElementById('toast-container');
var _maxToasts = 20;
var _toastSeq = 0;
var _newestToastEl = null;
var _hoverCount = 0; // number of toasts being hovered (pauses all timers)

function _formatArg(a){
  if(a === null) return 'null';
  if(a === undefined) return 'undefined';
  if(a instanceof Error) return (a.name || 'Error') + ': ' + (a.message || '(no message)');
  if(typeof a === 'string') return a;
  if(typeof a === 'number' || typeof a === 'boolean') return String(a);
  try{
    var j = JSON.stringify(a);
    if(j === '{}' || j === '[]') return String(a) !== '[object Object]' ? String(a) : j;
    return j;
  }catch(e){
    return String(a);
  }
}

function _updateOldestNewest(){
  if(!_toastContainer) return;
  var children = _toastContainer.children;
  for(var i = 0; i < children.length; i++){
    var c = children[i];
    // Remove old tags
    c.className = c.className.replace(/\s*(newest|oldest)/g, '');
    var oldTags = c.querySelectorAll('.toast-tag');
    for(var j = 0; j < oldTags.length; j++){
      if(oldTags[j].parentNode) oldTags[j].parentNode.removeChild(oldTags[j]);
    }
  }
  if(children.length === 0) return;
  // First DOM child = oldest visible (appears at bottom due to column-reverse)
  var oldest = children[0];
  // Last DOM child = newest (appears at top due to column-reverse)
  var newest = children[children.length - 1];
  newest.className += ' newest';
  _newestToastEl = newest;

  // Add tag badges (only if more than 1 toast)
  if(children.length > 1){
    oldest.className += ' oldest';
    var oTag = document.createElement('span');
    oTag.className = 'toast-tag t-oldest';
    oTag.textContent = 'OLDEST';
    // Insert after the countdown span (last child)
    var oFirstLine = oldest.querySelector('.toast-seq');
    if(oFirstLine && oFirstLine.parentNode){
      oFirstLine.parentNode.insertBefore(oTag, oFirstLine.nextSibling);
    }

    var nTag = document.createElement('span');
    nTag.className = 'toast-tag t-newest';
    nTag.textContent = 'NEWEST';
    var nFirstLine = newest.querySelector('.toast-seq');
    if(nFirstLine && nFirstLine.parentNode){
      nFirstLine.parentNode.insertBefore(nTag, nFirstLine.nextSibling);
    }
  }
}

function _showToast(level, args){
  if(!TOASTS_ENABLED || !_toastContainer) return;

  // Build message from arguments
  var parts = [];
  for(var i = 0; i < args.length; i++){
    var formatted = _formatArg(args[i]);
    if(formatted) parts.push(formatted);
  }
  var msg = parts.join(' ');
  if(!msg || !msg.replace(/\s/g,'')) return; // skip blank toasts

  _toastSeq++;
  var seq = _toastSeq;
  var badgeClass = level === 'error' ? 'b-err' : level === 'warn' ? 'b-warn' : 'b-log';
  var levelLabel = level === 'error' ? 'ERR' : level === 'warn' ? 'WRN' : 'LOG';

  var el = document.createElement('div');
  el.className = 'toast ' + level;

  // Build inner HTML:  #N [LEVEL] message text                    30s
  var seqSpan = document.createElement('span');
  seqSpan.className = 'toast-seq';
  seqSpan.textContent = '#' + seq;

  var badge = document.createElement('span');
  badge.className = 'toast-badge ' + badgeClass;
  badge.textContent = levelLabel;

  var textSpan = document.createElement('span');
  textSpan.textContent = msg;

  var countSpan = document.createElement('span');
  countSpan.className = 'toast-countdown';

  el.appendChild(seqSpan);
  el.appendChild(badge);
  el.appendChild(textSpan);
  el.appendChild(countSpan);

  _toastContainer.appendChild(el);

  // Cap total toasts — remove oldest
  while(_toastContainer.children.length > _maxToasts){
    _toastContainer.removeChild(_toastContainer.children[0]);
  }

  // Update oldest/newest classes and tags
  _updateOldestNewest();

  // 30s countdown, pauses on hover of ANY toast
  var remaining = 30;
  countSpan.textContent = remaining + 's';

  var tick = setInterval(function(){
    if(_hoverCount > 0) return; // any toast hovered → freeze all
    remaining--;
    countSpan.textContent = remaining + 's';
    if(remaining <= 0){
      clearInterval(tick);
      el.className = 'toast ' + level + ' fadeout';
      setTimeout(function(){
        if(el.parentNode) el.parentNode.removeChild(el);
        _updateOldestNewest();
      }, 300);
    }
  }, 1000);

  el.addEventListener('mouseenter', function(){ _hoverCount++; });
  el.addEventListener('mouseleave', function(){ _hoverCount = Math.max(0, _hoverCount - 1); });
}

var _origLog = console.log;
var _origWarn = console.warn;
var _origError = console.error;
console.log = function(){ _origLog.apply(console, arguments); try{ _showToast('log', arguments); }catch(e){} };
console.warn = function(){ _origWarn.apply(console, arguments); try{ _showToast('warn', arguments); }catch(e){} };
console.error = function(){ _origError.apply(console, arguments); try{ _showToast('error', arguments); }catch(e){} };

// ================================================================
//  CONFIGURATION
// ================================================================
var POLL_NORMAL   = 2000;
var POLL_THREAT   = 1000;
var FETCH_TIMEOUT = 8000;

// ================================================================
//  STATE
// ================================================================
var audioUnlocked       = false;
var lastVersion         = -1;
var lastDataCollectedAt = null;
var lastGeneratingSince = '';
var lastData            = null;
var consecutiveFails    = 0;
var pollTimer           = null;
var pollInFlight        = false;
var timerHandle         = null;
var everHadData         = false;
// Channels: store raw data + last server update time for client-side ticking/staleness
var lastChannelsData       = [];
var lastChannelsUpdateTime = 0;

// ================================================================
//  AUDIO ENGINE
//
//  Three mutually-exclusive sound states:
//
//    'alarm'  — ANY of the four Jerusalem/center fields is
//               non-empty. Repeats alarm.mp3 at max volume
//               with a short silence gap between bursts.
//
//    'tick'   — any OTHER threat boolean is TRUE. Soft periodic
//               click every ~1s. "Something is happening."
//
//    'silent' — all booleans FALSE. No sound.
//
//  Uses <audio> elements only (no Web Audio API — Hisense TVs
//  produce zero audible output from AudioContext despite reporting
//  state=running). Each sound creates a fresh Audio() element
//  (TV can't reliably reuse elements). Timing is driven by
//  onended callbacks, NOT setInterval, to prevent overlaps and
//  ensure uniform pacing. Old elements are explicitly released.
//
//  On connection loss, sound continues. If we lose WiFi during
//  an attack, the alarm must NOT stop.
// ================================================================

var soundState      = 'silent';  // 'silent' | 'tick' | 'alarm'

// Audio element pool — iOS WebKit requires each HTML5 Audio object to
// be *created* inside a user-gesture handler. Objects created later
// (setTimeout, XHR callback) will have play() silently rejected.
// Fix: pre-create a pool during the unlock tap, then draw from it.
var _audioPool  = [];
var _POOL_SIZE  = 10;
var tickEnabled     = true;      // user preference: play tick sounds for minor threats
var alarmJerusalemEnabled = true; // user preference: play alarm for Jerusalem fields
var alarmCenterEnabled    = true; // user preference: play alarm for Center fields

// ================================================================
//  AUDIO ENGINE — <audio> ELEMENTS ONLY
//
//  Uses native <audio> elements exclusively. No Web Audio API.
//  Web Audio (AudioContext, oscillators, AudioBufferSourceNode)
//  produces zero audible output on Hisense smart TVs despite
//  reporting state=running. <audio> elements are the only reliable
//  cross-device path (phones, desktops, and smart TVs).
//
//  DOUBLE-BUFFERED PLAYBACK (SoundLoop):
//  new Audio(url) must re-decode the MP3 into PCM every time, even
//  from cache. On slow smart TV CPUs this decode takes 50-200ms
//  with high variance, causing non-uniform pacing.
//
//  Fix: while the current element is playing, pre-create the NEXT
//  element and let it decode in the background. By the time onended
//  fires, the next element is already decoded and .play() is instant.
//
//  Audio files:
//
//  alarm.mp3 — Generated from alarm.wav (boosted +19dB, resampled to 44100Hz):
//    ffmpeg -i alarm.wav -af "volume=19dB" -ar 44100 -codec:a libmp3lame -b:a 128k alarm.mp3
//
//  tick.mp3 — Generated programmatically:
//    ffmpeg -f lavfi -i "aevalsrc='sin(800*2*PI*t)*exp(-8*t)':s=44100:d=0.25" \
//      -codec:a libmp3lame -b:a 128k tick.mp3
//    (250ms, 800Hz sine, full amplitude, slow decay, ~5KB)
//
//  Both files are pre-loaded at page load so they're cached and
//  available instantly, even in a bomb shelter with no internet.
// ================================================================

// ================================================================
//  SoundLoop — double-buffered repeating audio abstraction
//
//  Usage:
//    var loop = new SoundLoop('/tick.mp3', 1000);  // fixed 1s period
//    var loop = new SoundLoop('/alarm.mp3', 0);    // auto-duration (back-to-back)
//    loop.start();  // begins looping immediately
//    loop.stop();   // stops instantly, cleans up both elements
//
//  Period modes:
//    period > 0  — fixed-interval setTimeout chain (e.g. tick every 1s)
//    period === 0 — auto-duration: next cycle fires at clip duration + 50ms,
//                   producing urgent back-to-back playback (alarm)
//
//  Does NOT rely on onended (which silently never fires on some
//  smart TVs and mobile browsers). This guarantees:
//    - Exactly one Audio element plays at any time (no overlaps)
//    - Uniform pacing regardless of browser quirks
//    - Instant stop: .stop() kills everything synchronously
//    - TV-safe: fresh elements, ES5, no Web Audio API
// ================================================================

function obtainAudio(){
  if(_audioPool.length) return _audioPool.pop();
  console.warn('[POOL] Exhausted — creating new Audio (may be locked on iOS)');
  return new Audio();
}

function releaseAudio(el){
  if(!el) return;
  try{ el.onended = null; }catch(e){}
  try{ el.onerror = null; }catch(e){}
  try{ el.pause(); }catch(e){}
  _audioPool.push(el);
}

function SoundLoop(url, periodMs){
  this._url = url;
  this._period = periodMs;
  this._running = false;
  this._playing = null;   // currently-playing Audio element
  this._next = null;       // pre-created next Audio element (decoding)
  this._timer = null;      // setTimeout for next cycle
}

// Detach an Audio element — unhook callbacks, let it finish its last
// few ms of playback, then return to pool after a delay.
SoundLoop.prototype._detach = function(el){
  if(!el) return;
  try{ el.onended = null; }catch(e){}
  try{ el.onerror = null; }catch(e){}
  setTimeout(function(){ releaseAudio(el); }, 2000);
};

// Hard-stop an Audio element and return it to pool immediately.
// Used only by .stop() for immediate silence.
SoundLoop.prototype._kill = function(el){
  if(!el) return;
  releaseAudio(el);
};

// Pre-create the next Audio element so it decodes in the background.
// Called immediately after play() — the entire _period is available
// for decoding, so by next cycle the element is ready.
SoundLoop.prototype._prepareNext = function(){
  if(!this._running || this._next) return;
  try{
    var el = obtainAudio();
    el.src = this._url;
    el.preload = 'auto';
    el.volume = 1.0;
    this._next = el;
  }catch(e){}
};

// Core: release previous, play pre-decoded next, schedule next cycle.
//
// Period modes:
//   period > 0  — fixed-interval scheduling (tick: exactly 1000ms apart)
//   period === 0 — auto-duration: schedule next cycle at clip duration + 50ms
//                  gap, producing urgent back-to-back playback (alarm)
SoundLoop.prototype._cycle = function(){
  this._timer = null;

  // Let the previous element finish playing naturally (no clipping).
  // Just drop the reference — it will GC after playback ends.
  this._detach(this._playing);
  this._playing = null;

  if(!this._running) return;

  // Grab the pre-decoded element, or create a fresh one
  var el = this._next;
  this._next = null;
  if(!el){
    try{ el = obtainAudio(); el.src = this._url; }catch(e){}
  }
  if(!el){
    // Element creation failed — retry next cycle
    var self = this;
    this._timer = setTimeout(function(){ self._cycle(); }, this._period || 1000);
    return;
  }

  el.volume = 1.0;
  this._playing = el;

  // Start pre-decoding the NEXT element now (has full period to decode)
  this._prepareNext();

  // Play (fire-and-forget — timing is driven by setTimeout, not onended)
  try{
    var p = el.play();
    if(p && typeof p.catch === 'function') p.catch(function(e){
      console.warn('[SoundLoop] play() rejected:', e);
    });
  }catch(e){}

  // Compute delay for next cycle
  var delay = this._period;
  if(delay === 0){
    // Auto-duration: use measured clip length + 50ms gap
    var dur = el.duration;
    if(dur && isFinite(dur) && dur > 0){
      delay = Math.ceil(dur * 1000) + 50;
    } else {
      delay = 1000; // fallback until duration metadata is available
    }
  }

  var self = this;
  this._timer = setTimeout(function(){ self._cycle(); }, delay);
};

SoundLoop.prototype.start = function(){
  if(this._running) return;
  this._running = true;
  this._cycle();
};

SoundLoop.prototype.stop = function(){
  this._running = false;
  if(this._timer){ clearTimeout(this._timer); this._timer = null; }
  this._kill(this._playing);
  this._playing = null;
  this._kill(this._next);
  this._next = null;
};

//  alarm: period=0 → auto-duration (back-to-back, urgent, ~50ms gap)
//  tick:  period=1000ms (tick.mp3 is ~0.25s → ~0.75s silence gap)

// ================================================================
//  SOUND STATE MACHINE (called on every poll)
// ================================================================

function updateSoundState(data){
  if(!audioUnlocked) return;
  if(testMode) return; // don't clobber test playback; will re-evaluate when test ends

  var target;
  try{
    var _nonEmpty = function(f){ return typeof f === 'string' && f.length > 0; };
    var jerusalemActive = alarmJerusalemEnabled && [
      data.jerusalem_attack_warning,
      data.jerusalem_actual_red_alerts
    ].some(_nonEmpty);
    var centerActive = alarmCenterEnabled && [
      data.center_dan_or_yehuda_or_jerusalem_danger,
      data.confirmed_center_attack_not_just_north_south
    ].some(_nonEmpty);
    var shouldAlarm = jerusalemActive || centerActive;
    if(shouldAlarm){
      target = 'alarm';
    }else if(data.any_threat === true && tickEnabled){
      target = 'tick';
    }else{
      target = 'silent';
    }
  }catch(e){
    console.error('[SOUND] Error computing target state:', e);
    return;
  }

  if(target === soundState) return;

  console.log('[SOUND] Transitioning: ' + soundState + ' -> ' + target);

  try{
    if(soundState === 'alarm') stopAlarm();
    if(soundState === 'tick')  stopTick();
  }catch(e){
    console.error('[SOUND] Error stopping ' + soundState + ':', e);
  }

  try{
    if(target === 'alarm') startAlarm();
    if(target === 'tick')  startTick();
  }catch(e){
    console.error('[SOUND] Error starting ' + target + ':', e);
  }

  soundState = target;
}

window.unlock = function(){
  console.log('[UNLOCK] User tapped Enable Alerts (tick=' + tickEnabled + ')');
  // Kill any active test so testMode doesn't block real events
  if(testMode){
    stopAlarm();
    stopTick();
    testMode = false;
    testWhich = null;
    soundState = 'silent';
  }
  audioUnlocked = true;

  // Fill the audio element pool inside this user gesture. iOS WebKit
  // requires each HTML5 Audio object to be CREATED during a gesture
  // handler — objects created later (XHR, setTimeout) silently fail.
  // Pre-creating a pool here lets SoundLoop draw unlocked elements
  // at any time. Also play one element to fully activate the session.
  if(!_audioPool.length){
    for(var i = 0; i < _POOL_SIZE; i++){
      try{ _audioPool.push(new Audio()); }catch(e){ break; }
    }
    console.log('[POOL] Created ' + _audioPool.length + ' Audio elements');
  }
  try{
    var u = new Audio('/silence.mp3');
    var p = u.play();
    if(p && typeof p.then === 'function') p.then(function(){ try{ u.pause(); u.src=''; }catch(e){} });
    if(p && typeof p.catch === 'function') p.catch(function(){});
  }catch(e){}

  try{
    document.getElementById('welcome').classList.add('hidden');
  }catch(e){}
  if(lastData) updateSoundState(lastData);
};

window.toggleTick = function(){
  tickEnabled = !tickEnabled;
  console.log('[TICK] Toggle: ' + (tickEnabled ? 'ON' : 'OFF'));
  // Sync welcome screen checkbox
  var box = document.getElementById('tick-check');
  if(box){
    box.style.background = tickEnabled ? 'var(--yellow)' : 'transparent';
    box.querySelector('svg').style.opacity = tickEnabled ? '1' : '0';
  }
  // Sync panel mute button
  updateMuteBtn('tick', tickEnabled, true);
  // If tick is currently playing and user disabled it, stop immediately
  if(!tickEnabled && soundState === 'tick'){
    stopTick();
    soundState = 'silent';
  }
  // If tick was suppressed and user re-enabled, re-evaluate
  if(tickEnabled && audioUnlocked && !testMode && lastData){
    updateSoundState(lastData);
  }
};

window.testSound = function(which){
  // If tapping the same button that's already active: stop
  if(testMode && testWhich === which){
    console.log('[TEST] Stopping: ' + which);
    testStop();
    return;
  }

  // If switching from one test to another, or starting fresh
  console.log('[TEST] Starting: ' + which);
  stopAlarm();
  stopTick();

  testWasUnlocked = testMode ? testWasUnlocked : audioUnlocked;
  testMode = true;
  audioUnlocked = true;
  soundState = 'silent';
  testWhich = which;

  if(which === 'alarm'){
    soundState = 'alarm';
    startAlarm();
  }else{
    soundState = 'tick';
    startTick();
  }

  updateTestButtons();
};

var EXPECTED_THREAT_STRING_KEYS = [
  'israel_attack_warning',
  'israel_actual_red_alerts',
  'attack_involves_missiles_not_just_uavs',
  'jerusalem_attack_warning',
  'jerusalem_actual_red_alerts',
  'center_dan_or_yehuda_or_jerusalem_danger',
  'confirmed_center_attack_not_just_north_south'
];
var EXPECTED_BOOL_KEYS = ['any_threat'];
var EXPECTED_NEWS_STRING_KEYS = [
  'channel', 'headline', 'importance', 'summary',
  'time_of_report', 'time_of_event'
];

function showValidationErrors(errors){
  try{
    var bar = document.getElementById('validation-bar');
    if(!errors.length){
      bar.className = '';
      bar.style.display = 'none';
      return;
    }
    bar.className = 'visible';
    bar.style.display = 'block';
    bar.innerHTML = '<strong>VALIDATION (' + errors.length + ' issue'
      + (errors.length > 1 ? 's' : '') + '):</strong><br>'
      + errors.map(function(e){ return esc(e); }).join('<br>');
  }catch(e){
    console.error('[VALID] showValidationErrors error:', e);
  }
}

function validatePayload(d){
  var errs = [];
  try{
    if(d === null || typeof d !== 'object' || Array.isArray(d)){
      errs.push('payload is not a JSON object (got ' + typeof d + ')');
      return errs;
    }

    if(typeof d.version !== 'number' || !isFinite(d.version)){
      errs.push('version: expected number, got ' + typeof d.version + ' (' + String(d.version) + ')');
    }else if(d.version < 0){
      errs.push('version: expected non-negative, got ' + d.version);
    }

    if(typeof d.data_collected_at !== 'string'){
      errs.push('data_collected_at: expected string, got ' + typeof d.data_collected_at);
    }else if(d.version > 0 && d.data_collected_at.length === 0){
      errs.push('data_collected_at: empty string on a non-zero version (' + d.version + ')');
    }

    if(typeof d.generating_since !== 'string'){
      errs.push('generating_since: expected string, got ' + typeof d.generating_since);
    }

    for(var i = 0; i < EXPECTED_THREAT_STRING_KEYS.length; i++){
      var tkey = EXPECTED_THREAT_STRING_KEYS[i];
      if(!(tkey in d)){
        errs.push(tkey + ': MISSING from payload');
      }else if(typeof d[tkey] !== 'string'){
        errs.push(tkey + ': expected string, got ' + typeof d[tkey] + ' (' + JSON.stringify(d[tkey]) + ')');
      }
    }

    for(var i = 0; i < EXPECTED_BOOL_KEYS.length; i++){
      var key = EXPECTED_BOOL_KEYS[i];
      if(!(key in d)){
        errs.push(key + ': MISSING from payload');
      }else if(typeof d[key] !== 'boolean'){
        errs.push(key + ': expected boolean, got ' + typeof d[key] + ' (' + JSON.stringify(d[key]) + ')');
      }
    }

    if(!('news' in d)){
      errs.push('news: MISSING from payload');
    }else if(!Array.isArray(d.news)){
      errs.push('news: expected array, got ' + typeof d.news);
    }else{
      for(var j = 0; j < d.news.length; j++){
        var item = d.news[j];
        var prefix = 'news[' + j + ']';
        if(item === null || typeof item !== 'object' || Array.isArray(item)){
          errs.push(prefix + ': expected object, got ' + typeof item);
          continue;
        }
        for(var k = 0; k < EXPECTED_NEWS_STRING_KEYS.length; k++){
          var skey = EXPECTED_NEWS_STRING_KEYS[k];
          if(!(skey in item)){
            errs.push(prefix + '.' + skey + ': MISSING');
          }else if(typeof item[skey] !== 'string'){
            errs.push(prefix + '.' + skey + ': expected string, got '
              + typeof item[skey] + ' (' + JSON.stringify(item[skey]) + ')');
          }
        }
      }
    }

    var KNOWN_KEYS = {
      version:1, data_collected_at:1, generating_since:1, news:1,
      israel_attack_warning:1, israel_actual_red_alerts:1,
      attack_involves_missiles_not_just_uavs:1,
      jerusalem_attack_warning:1, jerusalem_actual_red_alerts:1,
      center_dan_or_yehuda_or_jerusalem_danger:1,
      confirmed_center_attack_not_just_north_south:1,
      any_threat:1, channels:1
    };
    var dKeys = Object.keys(d);
    for(var m = 0; m < dKeys.length; m++){
      if(!KNOWN_KEYS[dKeys[m]]){
        errs.push('unexpected key: "' + dKeys[m] + '"');
      }
    }
  }catch(e){
    errs.push('validation threw: ' + (e.message || String(e)));
  }
  return errs;
}

function updateTimer(){
  try{
    var el = document.getElementById('timer-val');
    if(!lastDataCollectedAt){
      el.textContent = 'Displayed data \u2014';
      el.style.color='var(--dim)';
      return;
    }
    var diff = Math.floor((Date.now() - new Date(lastDataCollectedAt).getTime()) / 1000);
    if(diff < 0){
      el.textContent = 'Displayed data just now';
      el.style.color='var(--dim)';
      return;
    }
    var m = Math.floor(diff / 60), s = diff % 60;
    var age;
    if(m >= 60){
      var h = Math.floor(m / 60);
      age = h + 'h ' + String(m % 60).padStart(2, '0') + 'm';
      el.style.color = 'var(--red)';
    }else if(m >= 5){
      age = m + 'm ' + String(s).padStart(2, '0') + 's';
      el.style.color = 'var(--yellow)';
    }else{
      age = m + 'm ' + String(s).padStart(2, '0') + 's';
      el.style.color = 'var(--dim)';
    }
    el.textContent = 'Displayed data ' + age + ' old';
  }catch(e){}
}

    if(centerThreat){
      panel.className = 'alert';
      header.innerHTML = '<span style="color:var(--red)">\u26A0 THREAT ALERT \u2014 WAKE UP \u26A0</span>';
    }else if(israelThreat){
      panel.className = 'warn';
      header.innerHTML = '<span style="color:var(--yellow)">\u26A0 ISRAEL THREAT \u2014 MONITORING</span>';
    }else{
      panel.className = 'clear';
      header.innerHTML = '<span style="color:var(--green)">ALL CLEAR</span>';
    }
    var html = '';
    for(var i = 0; i < THREAT_ROWS.length; i++){
      var row = THREAT_ROWS[i];
      if(row.group){
        var btnHtml = '';
        if(row.muteId){
          var isTick = row.muteType === 'tick';
          var enabled = isTick ? tickEnabled : (row.muteId === 'alarmJerusalem' ? alarmJerusalemEnabled : alarmCenterEnabled);
          var btnCls = 'group-mute-btn ' + (isTick ? 'tick-btn' : 'alarm-btn') + (enabled ? '' : ' muted');
          var icon = isTick ? (enabled ? ICON_SPEAKER : ICON_SPEAKER_OFF) : (enabled ? ICON_BELL : ICON_BELL_OFF);
          var lbl = isTick ? 'TICK' : 'ALARM';
          btnHtml = '<button class="' + btnCls + '" id="mute-' + row.muteId + '" onclick="toggleMute(\'' + row.muteId + '\')">' + icon + ' ' + lbl + '</button>';
        }
        html += '<div class="bool-group-header"><span>' + esc(row.group) + '</span>' + btnHtml + '</div>';
        continue;
      }
      var key = row[0], label = row[1];
      var reason = typeof d[key] === 'string' ? d[key] : '';
      var active = reason.length > 0;
      // Israel-wide fields get yellow styling; Jerusalem/Center fields get red.
      var isIsrael = ISRAEL_KEYS.indexOf(key) !== -1;
      var badgeCls = active ? (isIsrael ? 'yes-warn' : 'yes') : 'no';
      var labelCls = active ? (isIsrael ? 'active-warn' : 'active') : 'inactive';
      html += '<div class="bool-row"><span class="bool-badge ' + badgeCls + '">'
        + (active ? 'YES' : 'no') + '</span><div class="bool-info"><span class="bool-label '
        + labelCls + '">' + esc(label) + '</span>'
        + '<span class="bool-reason">' + (active ? esc(reason) : '') + '</span>'
        + '</div></div>';
    }
    bools.innerHTML = html;
  }catch(e){
    console.error('[RENDER] renderThreat error:', e);
  }
}

function safeStr(v, fallback){
  return typeof v === 'string' ? v : (fallback || '');
}

function renderNews(items){
  try{
    var list = document.getElementById('news-list');
    if(!Array.isArray(items) || !items.length){
      list.innerHTML = '<div class="empty-msg">No notable updates</div>';
      return;
    }
    var html = '';
    for(var i = 0; i < items.length; i++){
      var it = items[i];
      if(it === null || typeof it !== 'object' || Array.isArray(it)){
        console.error('[RENDER] news[' + i + '] is not an object, skipping');
        continue;
      }
      var importance = safeStr(it.importance, 'unknown');
      var cls = importance.toLowerCase();
      var headline = safeStr(it.headline, '(no headline)');
      var channel = safeStr(it.channel, '(unknown channel)');
      var summary = safeStr(it.summary, '');
      var timeReport = safeStr(it.time_of_report);
      var timeEvent = safeStr(it.time_of_event);
      var timeStr = '';
      if(timeReport) timeStr += ' \u00B7 reported ' + esc(timeReport);
      if(timeEvent)  timeStr += ' \u00B7 event ' + esc(timeEvent);
      html += '<div class="news-card"><span class="tag ' + cls + '">' + esc(importance)
        + '</span><div class="headline">' + esc(headline)
        + '</div><div class="channel">' + esc(channel) + timeStr
        + '</div><div class="summary">' + esc(summary) + '</div></div>';
    }
    if(!html) html = '<div class="empty-msg">No renderable news items</div>';
    list.innerHTML = html;
  }catch(e){
    console.error('[RENDER] renderNews error:', e);
  }
}

function fmtAgo(isoStr){
  try{
    if(!isoStr) return '\u2014';
    var diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
    if(!isFinite(diff) || diff < 0) return 'just now';
    if(diff < 60) return diff + 's ago';
    var m = Math.floor(diff / 60), s = diff % 60;
    if(m < 60) return m + 'm ' + String(s).padStart(2, '0') + 's ago';
    var h = Math.floor(m / 60);
    return h + 'h ' + String(m % 60).padStart(2, '0') + 'm ago';
  }catch(e){
    return '?';
  }
}

function renderChannels(channels){
  try{
    var el = document.getElementById('channels-body');
    if(!Array.isArray(channels) || !channels.length){
      el.innerHTML = '<div class="empty-msg">No channels active</div>';
      return;
    }
    var html = '<table class="ch-table"><thead><tr>'
      + '<th>Channel</th><th style="text-align:right">Messages</th>'
      + '<th style="text-align:right">Latest</th></tr></thead><tbody>';
    for(var i = 0; i < channels.length; i++){
      var ch = channels[i];
      html += '<tr><td class="ch-name">' + esc(safeStr(ch.name, '?'))
        + '</td><td class="ch-count">' + ((ch.message_count || 0))
        + '</td><td class="ch-time">' + esc(fmtAgo(ch.latest_message))
        + '</td></tr>';
    }
    html += '</tbody></table>';
    el.innerHTML = html;
  }catch(e){
    console.error('[RENDER] renderChannels error:', e);
  }
}

function showLoading(msg){
  try{
    document.getElementById('news-list').innerHTML =
      '<div id="loading"><div class="spinner"></div>'
      + '<p style="margin-top:12px">' + msg + '</p></div>';
  }catch(e){}
}

function setConnStatus(cls, msg){
  try{
    var bar = document.getElementById('conn-bar');
    bar.className = cls;
    bar.textContent = msg;
  }catch(e){}
}

// ================================================================
//  POLLING ENGINE (XHR for smart TV compatibility)
// ================================================================

function schedulePoll(delayMs){
  if(pollTimer !== null){ clearTimeout(pollTimer); pollTimer = null; }
  pollTimer = setTimeout(poll, delayMs);
}

function poll(){
  if(pollInFlight){ schedulePoll(500); return; }
  pollInFlight = true;

  function finish(){
    pollInFlight = false;
    schedulePoll(soundState === 'alarm' ? POLL_THREAT : POLL_NORMAL);
  }

  function handleError(reason){
    consecutiveFails++;
    if(consecutiveFails === 1){
      setConnStatus('warn', 'Reconnecting\u2026');
    }else if(consecutiveFails >= 3){
      setConnStatus('err', 'Connection lost \u2014 retrying\u2026 (' + consecutiveFails + ')');
    }
    finish();
  }

  var xhr;
  try{
    xhr = new XMLHttpRequest();
  }catch(e){
    console.error('[POLL] XMLHttpRequest constructor failed:', e);
    handleError('xhr-ctor');
    return;
  }

  try{
    xhr.open('GET', '/api/status?_=' + Date.now(), true);
  }catch(e){
    console.error('[POLL] xhr.open failed:', e);
    handleError('xhr-open');
    return;
  }

  xhr.timeout = FETCH_TIMEOUT;
  try{ xhr.setRequestHeader('Accept', 'application/json'); }catch(e){}

  xhr.onload = function(){
    try{
      if(xhr.status < 200 || xhr.status >= 300){
        handleError('http-' + xhr.status);
        return;
      }

      var text = xhr.responseText;
      if(!text){
        handleError('empty-body');
        return;
      }

      var d;
      try{
        d = JSON.parse(text);
      }catch(e){
        console.error('[POLL] JSON parse failed:', e);
        handleError('json-parse');
        return;
      }

      // Validate
      var vErrs = validatePayload(d);
      if(vErrs.length > 0){
        for(var vi = 0; vi < vErrs.length; vi++){
          console.error('[VALIDATION] ' + vErrs[vi]);
        }
        showValidationErrors(vErrs);
      }else{
        showValidationErrors([]);
      }

      if(d === null || typeof d !== 'object' || Array.isArray(d)){
        handleError('not-object');
        return;
      }

      // Success
      var wasDown = consecutiveFails > 0;
      consecutiveFails = 0;

      var ver = typeof d.version === 'number' ? d.version : Number(d.version);
      if(!isFinite(ver)) ver = 0;

      if(ver > 0){
        lastGeneratingSince = typeof d.generating_since === 'string' ? d.generating_since : '';
        updateGenTimer();
        var chArr = Array.isArray(d.channels) ? d.channels : [];
        lastChannelsData = chArr;
        lastChannelsUpdateTime = Date.now();
        renderChannels(chArr);

        var isNew = (ver !== lastVersion);
        if(isNew){
          lastVersion  = ver;
          lastDataCollectedAt = typeof d.data_collected_at === 'string' ? d.data_collected_at : '';
          lastData     = d;
          everHadData  = true;
          renderThreat(d);
          renderNews(Array.isArray(d.news) ? d.news : []);
        }
        setConnStatus('ok', '');
        updateSoundState(d);
      }else{
        if(everHadData){
          setConnStatus('restarted', 'Server restarted \u2014 waiting for next LLM update\u2026');
        }else{
          showLoading('Waiting for first LLM update\u2026');
          setConnStatus('ok', '');
        }
        lastVersion = -1;
      }

      if(wasDown && lastData){
        renderThreat(lastData);
        renderNews(Array.isArray(lastData.news) ? lastData.news : []);
      }

      finish();
    }catch(e){
      console.error('[POLL] Exception in onload:', e);
      handleError('onload-exception');
    }
  };

  xhr.onerror = function(){ handleError('network'); };
  xhr.ontimeout = function(){ handleError('timeout'); };

  try{ xhr.send(); }catch(e){
    console.error('[POLL] xhr.send failed:', e);
    handleError('send');
  }
}
